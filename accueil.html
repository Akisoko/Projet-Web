<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Kezan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <img src="https://images.seeklogo.com/logo-png/15/2/world-of-warcraft-horde-pvp-logo-png_seeklogo-153902.png" alt="Kezan Logo" class="logo-img">
            <span class="logo-text">Kezan</span>
        </div>

        <nav class="nav-menu">
            <a href="accueil.html" class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span>Accueil</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Recherche de Profil</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-briefcase"></i>
                <span>Offres</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-building"></i>
                <span>Entreprises</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i>
                <span>Statistiques</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear"></i>
                <span>Paramètres</span>
            </a>
            <a href="mentions.html" class="nav-item">
                <i class="fa-solid fa-file-contract"></i>
                <span>Mentions Légales</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Deconnexion</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <button class="burger-menu" id="burgerMenu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <button class="back-button">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h1>Accueil</h1>
            </div>
            <div class="header-right">
                <button class="menu-dots">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a href="profil.html" class="user-avatar">
                    <i class="fa-solid fa-user"></i>
                </a>
            </div>
        </header>

        <div class="home-content">
            <section class="section wishlist-section">
                <h2>Votre Wishlist</h2>
                <div class="carousel-container">
                    <button class="carousel-btn prev">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <div class="wishlist-carousel">
                        <div class="wishlist-card">
                            <div class="card-header">
                                <div class="card-avatar">
                                    <i class="fa-solid fa-user"></i>
                                </div>
                                <div class="card-lines">
                                    <div class="line"></div>
                                    <div class="line"></div>
                                    <div class="line"></div>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                            <button class="wishlist-heart">
                                <i class="fa-solid fa-heart"></i>
                            </button>
                        </div>
                    </div>
                    <button class="carousel-btn next">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </section>

            <section class="section">
                <h2>Entreprises recommandées</h2>
                <div class="cards-grid">
                    <div class="company-card">
                        <div class="company-header">
                            <div class="company-logo">
                                Logo<br>Entreprise
                            </div>
                            <div class="company-info">
                                <div class="line"></div>
                                <div class="line short"></div>
                            </div>
                        </div>
                        <div class="company-body">
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                        </div>
                        <div class="company-footer">
                                <span class="location">
                                    <i class="fa-solid fa-location-dot"></i>
                                    <div class="line mini"></div>
                                </span>
                            <span class="status online">
                                    <i class="fa-solid fa-circle"></i>
                                </span>
                        </div>
                    </div>
                    <div class="company-card">
                        <div class="company-header">
                            <div class="company-logo">
                                Logo<br>Entreprise
                            </div>
                            <div class="company-info">
                                <div class="line"></div>
                                <div class="line short"></div>
                            </div>
                        </div>
                        <div class="company-body">
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                        </div>
                        <div class="company-footer">
                                <span class="location">
                                    <i class="fa-solid fa-location-dot"></i>
                                    <div class="line mini"></div>
                                </span>
                            <span class="status online">
                                    <i class="fa-solid fa-circle"></i>
                                </span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section">
                <h2>Offres recommandées</h2>
                <div class="cards-grid">
                    <div class="offer-card">
                        <div class="card-header">
                            <div class="card-avatar">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div class="card-lines">
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                        </div>
                        <button class="wishlist-heart">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>
                    <div class="offer-card">
                        <div class="card-header">
                            <div class="card-avatar">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div class="card-lines">
                                <div class="line"></div>
                                <div class="line"></div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                            <div class="line"></div>
                        </div>
                        <button class="wishlist-heart">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
