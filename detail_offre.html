<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail de l'offre - Kezan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <img src="https://img.icons8.com/color/512/world-of-warcraft-horde.png" alt="Kezan Logo" class="logo-img">
            <span class="logo-text">Kezan</span>
        </div>

        <nav class="nav-menu">
            <a href="accueil.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Accueil</span>
            </a>
            <a href="recherche.html" class="nav-item">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Recherche de Profil</span>
            </a>
            <a href="offres.html" class="nav-item active">
                <i class="fa-solid fa-briefcase"></i>
                <span>Offres</span>
            </a>
            <a href="entreprises.html" class="nav-item">
                <i class="fa-solid fa-building"></i>
                <span>Entreprises</span>
            </a>
            <a href="statistiques.html" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i>
                <span>Statistiques</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear"></i>
                <span>Paramètres</span>
            </a>
            <a href="mentions.html" class="nav-item">
                <i class="fa-solid fa-file-contract"></i>
                <span>Terms & Conditions</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Deconnexion</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <button class="burger-menu" id="burgerMenu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <button class="back-button" onclick="window.location.href='liste_offre.html'">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h1>Detail de l'offre</h1>
            </div>
            <div class="header-right">
                <button class="menu-dots">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a href="profil.html" class="user-avatar">
                    <i class="fa-solid fa-user"></i>
                </a>
            </div>
        </header>

        <div class="detail-content">
            <div class="detail-card">
                <div class="detail-actions">
                    <button class="detail-action-btn delete">
                        <span>Supprimer l'offre</span>
                    </button>
                    <button class="detail-action-btn edit">
                        <span>Modifier l'offre</span>
                    </button>
                </div>

                <div class="detail-section">
                    <h3>Informations générales :</h3>
                    <div class="detail-lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>

                <div class="detail-section">
                    <h3>Détails :</h3>
                    <div class="detail-lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                </div>

                <button class="btn-primary detail-submit" onclick="window.location.href='postuler_offre.html'">Postuler</button>
            </div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
