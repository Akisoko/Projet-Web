<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Kezan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo">
            <img src="https://images.seeklogo.com/logo-png/15/2/world-of-warcraft-horde-pvp-logo-png_seeklogo-153902.png" alt="Kezan Logo" class="logo-img">
            <span class="logo-text">Kezan</span>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Accueil</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Recherche de Profil</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-briefcase"></i>
                <span>Offres</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-building"></i>
                <span>Entreprises</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-chart-bar"></i>
                <span>Statistiques</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <a href="#" class="nav-item">
                <i class="fa-solid fa-gear"></i>
                <span>Paramètres</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Deconnexion</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Profil</h1>
            <div class="user-info">
                <span>Cisco Ninja</span>
                <div class="user-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </header>

        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fa-solid fa-user fa-3x"></i>
                    <button class="edit-avatar">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                </div>
                <h2>Bysau Sinja</h2>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <h3>Offres<br>postulées</h3>
                    <div class="stat-number">0 mdr pas de stage</div>
                </div>
                <div class="stat-card">
                    <h3>Réponse<br>Offres</h3>
                    <div class="stat-number">Crois le</div>
                </div>
            </div>

            <div class="actions-grid">
                <button class="action-btn">
                    <i class="fa-solid fa-file-lines fa-2x"></i>
                    <span>Modif CV</span>
                </button>
                <button class="action-btn">
                    <i class="fa-solid fa-envelope fa-2x"></i>
                    <span>Modif LM</span>
                </button>
                <button class="action-btn">
                    <i class="fa-solid fa-heart fa-2x"></i>
                    <span>Wishlist</span>
                </button>
                <button class="action-btn">
                    <i class="fa-solid fa-right-from-bracket fa-2x"></i>
                    <span>Deconnexion</span>
                </button>
                <button class="action-btn">
                    <i class="fa-solid fa-gear fa-2x"></i>
                    <span>Paramètres</span>
                </button>
                <button class="action-btn">
                    <i class="fa-solid fa-file-contract fa-2x"></i>
                    <span>Terms & Conditions</span>
                </button>
            </div>
        </div>
    </main>
</div>
</body>
</html>
